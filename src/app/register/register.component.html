<div class="container">
  <h2>Register</h2>
  <form (ngSubmit)="savReq()" #registerForm="ngForm">
    <div class="form-group">
      <label for="name">Username</label>
      <input type="text" class="form-control" id="name" required minlength="3" [(ngModel)]="user.name" name="name">
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" class="form-control" id="email" required [(ngModel)]="user.email" name="email">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" class="form-control" id="password" required minlength="6" [(ngModel)]="user.password" name="password">
    </div>
    <div class="form-group">
      <label for="role">Role</label>
      <select class="form-control" id="role" [(ngModel)]="user.role" name="role">
        <option value="USER">User</option>
        <option value="HR_MANAGER">HR Manager</option>
        <option value="ADMIN">Admin</option>
      </select>
    </div>
    <button type="submit" class="btn btn-primary" [disabled]="!registerForm.form.valid">Register</button>
    <div *ngIf="errorMessage" class="alert alert-danger mt-3">
      {{ errorMessage }}
    </div>
    <div *ngIf="successMessage" class="alert alert-success mt-3">
      {{ successMessage }}
    </div>
  </form>
</div>
